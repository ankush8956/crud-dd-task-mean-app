version: '3.8'
services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  backend:
    image: ${DOCKERHUB_USERNAME:-yourhub}/angular-15-crud-backend:latest
    environment:
      - PORT=8080
      - MONGODB_URI=mongodb://mongo:27017/dd_db
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    image: ${DOCKERHUB_USERNAME:-yourhub}/angular-15-crud-frontend:latest
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  mongo-data:
