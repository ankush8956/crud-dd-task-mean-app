name: CI/CD

on:
  push:
    branches: [ main ]

env:
  DOCKERHUB_REPO_FRONT: ${{ secrets.DOCKERHUB_USERNAME }}/angular-15-crud-frontend
  DOCKERHUB_REPO_BACK: ${{ secrets.DOCKERHUB_USERNAME }}/angular-15-crud-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_REPO_BACK }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_REPO_FRONT }}:latest

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 60s
          command_timeout: 600s
          script: |
            set -euo pipefail
            echo "Starting remote deploy..."
            echo "Pulling images: ${{ env.DOCKERHUB_REPO_BACK }} and ${{ env.DOCKERHUB_REPO_FRONT }}"
            docker pull ${{ env.DOCKERHUB_REPO_BACK }}:latest || true
            docker pull ${{ env.DOCKERHUB_REPO_FRONT }}:latest || true

            # Choose docker-compose v1 or v2 (plugin)
            if command -v docker-compose >/dev/null 2>&1; then
              DC="docker-compose -f ~/docker-compose.prod.yml"
            else
              DC="docker compose -f ~/docker-compose.prod.yml"
            fi

            echo "Using: $DC"

            # Try pull with retries
            n=0
            until [ $n -ge 3 ]
            do
              $DC pull && break
              n=$((n+1))
              echo "Pull attempt $n failed, retrying in 5s..."
              sleep 5
            done

            # Start/update services
            $DC up -d
